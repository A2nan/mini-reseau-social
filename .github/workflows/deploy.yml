name: CI/CD Mini Réseau Social

# Déclenché à chaque push sur main. Grâce aux filtres de chemin, seul le
# composant modifié (backend ou frontend) est reconstruit et redéployé.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {} # permet aussi un déclenchement manuel

permissions:
  contents: read
  packages: write # nécessaire pour pousser sur ghcr.io

# Runner Windows self-hosted -> PowerShell (bash de WSL non fiable pour les chemins)
defaults:
  run:
    shell: powershell

jobs:
  # 1) Détecte quels composants ont changé
  changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # 2) Backend : build -> image -> push GHCR -> rollout
  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Variables
        id: vars
        run: |
          $owner = "${{ github.repository_owner }}".ToLower()
          $sha = "${{ github.sha }}".Substring(0,7)
          "image=ghcr.io/$owner/mini-social-backend" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        run: |
          $img = "${{ steps.vars.outputs.image }}"
          $sha = "${{ steps.vars.outputs.sha }}"
          $env:BUILDX_NO_DEFAULT_ATTESTATIONS = "1"
          docker build --provenance=false --sbom=false -t "${img}:${sha}" -t "${img}:latest" ./backend
          docker push "${img}:${sha}"
          docker push "${img}:latest"

      - name: Rollout dans le cluster
        run: |
          $img = "${{ steps.vars.outputs.image }}"
          $sha = "${{ steps.vars.outputs.sha }}"
          kubectl --context filrouge -n mini-social set image deployment/backend backend="${img}:${sha}" db-migrate="${img}:${sha}"
          kubectl --context filrouge -n mini-social rollout status deployment/backend --timeout=180s

  # 3) Frontend : build -> image -> push GHCR -> rollout
  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Variables
        id: vars
        run: |
          $owner = "${{ github.repository_owner }}".ToLower()
          $sha = "${{ github.sha }}".Substring(0,7)
          "image=ghcr.io/$owner/mini-social-frontend" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        run: |
          $img = "${{ steps.vars.outputs.image }}"
          $sha = "${{ steps.vars.outputs.sha }}"
          $env:BUILDX_NO_DEFAULT_ATTESTATIONS = "1"
          docker build --provenance=false --sbom=false -t "${img}:${sha}" -t "${img}:latest" ./frontend
          docker push "${img}:${sha}"
          docker push "${img}:latest"

      - name: Rollout dans le cluster
        run: |
          $img = "${{ steps.vars.outputs.image }}"
          $sha = "${{ steps.vars.outputs.sha }}"
          kubectl --context filrouge -n mini-social set image deployment/frontend frontend="${img}:${sha}"
          kubectl --context filrouge -n mini-social rollout status deployment/frontend --timeout=180s

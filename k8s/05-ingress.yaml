# Ingress externe : route / -> frontend et /api -> backend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mini-social-ingress
  namespace: mini-social
  # Pas de rewrite-target : les routes Symfony sont déjà préfixées par /api,
  # on transmet donc le chemin tel quel au backend.
spec:
  ingressClassName: nginx
  rules:
    - host: social.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

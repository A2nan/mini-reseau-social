# Configuration non sensible (ConfigMap) + secrets (Secret)
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: mini-social
data:
  POSTGRES_DB: social
  POSTGRES_USER: app
  APP_ENV: "prod"
  APP_DEBUG: "0"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: mini-social
type: Opaque
stringData:
  # Mot de passe PostgreSQL (utilisé par la base ET par l'API)
  POSTGRES_PASSWORD: app_password
  # Secret applicatif Symfony
  APP_SECRET: "change-me-with-a-real-random-secret"
  # Chaîne de connexion complète pour Doctrine
  DATABASE_URL: "postgresql://app:app_password@postgres:5432/social?serverVersion=16&charset=utf8"

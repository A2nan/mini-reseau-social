# API Symfony
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mini-social
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Attend PostgreSQL et crée le schéma AVANT de démarrer l'API.
      # Évite la course au démarrage (postgres plus lent que le backend).
      initContainers:
        - name: db-migrate
          image: mini-social/backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "[init] Attente de la base et création du schéma..."
              until php bin/console doctrine:schema:update --force --complete --no-interaction; do
                echo "[init] Base indisponible, nouvelle tentative dans 3s..."
                sleep 3
              done
              echo "[init] Schéma à jour."
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_ENV
            - name: APP_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_DEBUG
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: APP_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
      containers:
        - name: backend
          image: mini-social/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_ENV
            - name: APP_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_DEBUG
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: APP_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mini-social
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 80
